kind = "web"
previewPath = "/"
title = "Francesco's"
version = "1.0.0"
id = "artifacts/francescos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25724

[services.development]
run = "pnpm --filter @workspace/francescos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/francescos", "run", "build" ]
publicDir = "artifacts/francescos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25724"
BASE_PATH = "/"
